rl:
  algorithm: "grpo"
  sft_checkpoint: "sft-epoch-2"
  steps: 1000
  batch_size: 16
  num_completions: 8
  learning_rate: 5.0e-6
  kl_coeff: 0.05
  clip_ratio: 0.2
  temperature: 0.7
  max_new_tokens: 4096
  checkpoint_every: 100
  log_every: 10

reward:
  format_reward_weight: 0.1
  geometric_weight: 0.7
  text_alignment_weight: 0.2
  geometry:
    resemblance:
      threshold: 0.05
  text_alignment:
    threshold: 0.25

# modal.endpoint and modal.auth_token are loaded from dev.env via
# LLM3D_MODAL__ENDPOINT and LLM3D_MODAL__AUTH_TOKEN environment variables.

logging:
  wandb_project: "image-to-3d-rlvr"
  wandb_enabled: false
  level: "INFO"
