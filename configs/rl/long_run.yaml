# Long training run with more steps and conservative LR.
algorithm: "grpo"
sft_checkpoint: "sft-epoch-2"
steps: 3000
batch_size: 16
num_completions: 8
learning_rate: 2.0e-6
kl_coeff: 0.03
clip_ratio: 0.2
temperature: 0.7
max_new_tokens: 4096
checkpoint_every: 200
log_every: 10
prompt_path: "datasets/rl_prompts.jsonl"
