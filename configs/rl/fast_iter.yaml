# Faster iteration: fewer steps and higher LR for quick experiments.
algorithm: "grpo"
sft_checkpoint: "sft-epoch-2"
steps: 200
batch_size: 8
num_completions: 4
learning_rate: 1.0e-5
kl_coeff: 0.05
clip_ratio: 0.2
temperature: 0.7
max_new_tokens: 4096
checkpoint_every: 50
log_every: 5
prompt_path: "datasets/rl_prompts.jsonl"
