# Default project configuration for text-to-3D RLVR pipeline
# Override with environment variables (LLM3D_ prefix) or pass a different YAML.

project_name: "llm-3d"
seed: 42
output_dir: "./output"
data_dir: "./data"
blender_path: "blender"

views:
  num_views: 4
  resolution: [512, 512]
  engine: "BLENDER_EEVEE_NEXT"
  elevation_deg: 25.0
  film_transparent: true
  sun_energy: 3.0
  camera_distance_factor: 2.5

objaverse_filter:
  min_face_count: 100
  max_vertex_count: 500000
  exclude_animated: true
  output_path: "datasets/filtered_uids.json"

storage:
  backend: "hf"
  hf_bucket: "llm3d-data"
  hf_bucket_namespace: ""
  cache_dir: ".cache/hf_data"
  local_manifest_path: "data/manifest.jsonl"
  manifest_key: "datasets/manifest.jsonl"
  mesh_prefix: "meshes"
  modal_volume_mesh_subdir: "meshes"

synthetic_gen:
  teacher_model: "gpt-4o-mini"
  teacher_provider: "openai"
  temperature: 0.7
  max_attempts_per_caption: 3
  cd_threshold: 0.05
  f_score_threshold: 0.1
  min_faces: 4
  max_vertices: 100000
  batch_size: 50
  max_concurrent_blender: 32
  output_path: "datasets/synthetic_sft.jsonl"
  hard_prompts_path: "datasets/hard_prompts.csv"
  checkpoint_path: "datasets/synthetic_checkpoint.json"

hard_mining:
  enabled: true
  hard_prompts_csv: "datasets/hard_prompts.csv"
  hard_prompt_ratio: 0.4
  min_failure_rate: 0.5
  min_attempts: 2

quality_gate:
  min_faces: 4
  max_vertices: 100000
  cd_threshold: 0.05
  min_f_score_005: 0.05

dataset:
  sft_train_ratio: 0.90
  sft_val_ratio: 0.05
  curriculum: true
  difficulty_weights:
    code_length_tokens: 0.4
    vertex_count: 0.3
    face_count: 0.3
  system_prompt: >
    You are an expert Blender Python developer. Given a text description of a
    3D object, write a complete bpy script that creates the described geometry.
    Use standard bpy operations (primitives, BMesh, modifiers, booleans, curves).
    The script must: 1. Start with `import bpy` and clear the default scene.
    2. Create the geometry described. 3. Export the result to OBJ at the path
    from os.environ['EXPORT_PATH']. Output only the Python code, no explanations.

modal:
  blender_version: "4.2.0"
  blender_cpu: 2
  blender_memory_mb: 4096
  blender_timeout_s: 150
  exec_timeout_s: 120
  metrics_cpu: 2
  metrics_memory_mb: 2048
  metrics_timeout_s: 60
  render_cpu: 2
  render_memory_mb: 4096
  render_timeout_s: 300
  reward_cpu: 4
  reward_memory_mb: 8192
  reward_timeout_s: 600
  reward_concurrency: 50
  reward_keep_warm: 1
  max_parallel_workers: 64
  volume_name: "llm3d-data"

metrics:
  num_sample_points_fast: 10000
  num_sample_points_eval: 100000
  f_score_thresholds: [0.01, 0.05]
  hausdorff_percentile: 90.0
  clip_model: "openai/clip-vit-large-patch14"
  clip_num_views: 4

reward:
  geometric_weight: 0.7
  text_alignment_weight: 0.2
  format_reward_weight: 0.1
  geometry:
    non_empty:
      enabled: true
      weight: 1.0
    import_bpy:
      enabled: true
      weight: 1.0
    exec_success:
      enabled: true
      weight: 1.0
    min_faces:
      enabled: true
      weight: 1.0
      threshold: 4
    max_vertices:
      enabled: true
      weight: 1.0
      threshold: 100000
    metrics_available:
      enabled: true
      weight: 1.0
    resemblance:
      enabled: true
      weight: 1.0
      threshold: 0.05
  text_alignment:
    enabled: true
    weight: 1.0
    threshold: 0.25
    requires_resemblance: true
  format:
    import_first:
      enabled: true
      weight: 1.0
    has_comments:
      enabled: true
      weight: 1.0
    clears_scene:
      enabled: true
      weight: 1.0
    has_export:
      enabled: true
      weight: 1.0

tinker:
  base_model: "Qwen/Qwen2.5-Coder-7B-Instruct"

sft:
  base_model: "Qwen/Qwen2.5-Coder-7B-Instruct"
  lora_rank: 32
  lora_alpha: 64
  train_mlp: true
  train_attn: true
  train_unembed: true
  epochs: 3
  batch_size: 8
  grad_accum_steps: 4
  learning_rate: 1.0e-4
  weight_decay: 0.01
  warmup_steps: 100
  max_seq_length: 32768
  eval_every_n_steps: 500
  eval_num_samples: 200
  eval_temperature: 0.0
  train_path: "datasets/sft_train.jsonl"
  val_path: "datasets/sft_val.jsonl"

rl:
  algorithm: "grpo"
  sft_checkpoint: "sft-epoch-2"
  steps: 1000
  batch_size: 16
  num_completions: 8
  learning_rate: 5.0e-6
  kl_coeff: 0.05
  clip_ratio: 0.2
  temperature: 0.7
  max_new_tokens: 4096
  checkpoint_every: 100
  log_every: 10
  prompt_path: "datasets/rl_prompts.jsonl"

eval:
  id_test_size: 1500
  ood_objaverse: 500
  ood_gso: 300
  ood_unseen_categories: 200
  unseen_categories:
    - fork
    - spoon
    - tv
    - window
    - door
  temperature: 0.0
  bootstrap_samples: 10000

logging:
  level: "INFO"
  log_dir: "./logs"
  wandb_project: "text-to-3d-rlvr"
  wandb_enabled: false
