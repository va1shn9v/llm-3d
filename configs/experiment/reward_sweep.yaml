# @package _global_

# Sweep reward weights and f_score targets to find best reward shape.
# Usage: python -m training.rl_trainer +experiment=reward_sweep --multirun

defaults:
  - override /rl: fast_iter

hydra:
  sweeper:
    params:
      reward.f_score_target: "0.4,0.6,0.8"
      reward.geometric_weight: "0.5,0.7,0.9"
      reward.text_alignment_weight: "0.1,0.2,0.3"
