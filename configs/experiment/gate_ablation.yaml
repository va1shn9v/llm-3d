# @package _global_

# Ablation over binary reward thresholds to study their effect on RL signal.
# Usage: python -m training.rl_trainer +experiment=gate_ablation --multirun

defaults:
  - override /rl: fast_iter

hydra:
  sweeper:
    params:
      reward.geometry.min_faces.threshold: "4,8,12"
      reward.geometry.max_vertices.threshold: "50000,100000,150000"
      reward.geometry.resemblance.threshold: "0.04,0.05,0.06"
