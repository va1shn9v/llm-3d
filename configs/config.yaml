defaults:
  - reward: default
  - rl: default
  - sft: default
  - _self_

project_name: "llm-3d"
seed: 42
output_dir: "./output"
data_dir: "./data"
blender_path: "blender"

views:
  num_views: 4
  resolution: [512, 512]
  engine: "BLENDER_EEVEE_NEXT"
  elevation_deg: 25.0
  film_transparent: true
  sun_energy: 3.0
  camera_distance_factor: 2.5
  cycles_samples: 128

quality_gate:
  min_faces: 4
  max_vertices: 100000
  cd_threshold: 0.05
  min_f_score_005: 0.05

objaverse_filter:
  quality_tiers: ["High", "Superior"]
  exclude_scenes: true
  exclude_transparent: true
  max_uids: null
  output_path: "datasets/filtered_uids.json"

synthetic_gen:
  teacher_model: "gpt-4o-mini"
  teacher_provider: "openai"
  temperature: 0.7
  max_attempts_per_caption: 3
  cd_threshold: 0.05
  f_score_threshold: 0.1
  min_faces: 4
  max_vertices: 100000
  batch_size: 50
  max_concurrent_blender: 32
  output_path: "datasets/synthetic_sft.jsonl"
  hard_prompts_path: "datasets/hard_prompts.csv"
  checkpoint_path: "datasets/synthetic_checkpoint.json"

hard_mining:
  enabled: true
  hard_prompts_csv: "datasets/hard_prompts.csv"
  hard_prompt_ratio: 0.4
  min_failure_rate: 0.5
  min_attempts: 2

dataset:
  sft_train_ratio: 0.90
  sft_val_ratio: 0.05
  eval_id_ratio: 0.03
  eval_ood_ratio: 0.02
  curriculum: true
  difficulty_weights:
    code_length_tokens: 0.4
    vertex_count: 0.3
    face_count: 0.3
  system_prompt: >
    You are an expert Blender Python developer. Given a text description of a
    3D object, write a complete bpy script that creates the described geometry.
    Use standard bpy operations (primitives, BMesh, modifiers, booleans, curves).
    The script must: 1. Start with `import bpy` and clear the default scene.
    2. Create the geometry described. 3. Export the result to OBJ at the path
    from os.environ['EXPORT_PATH']. Output only the Python code, no explanations.

modal:
  blender_version: "4.2.0"
  blender_cpu: 2
  blender_memory_mb: 4096
  blender_timeout_s: 150
  exec_timeout_s: 120
  metrics_cpu: 2
  metrics_memory_mb: 2048
  metrics_timeout_s: 60
  render_cpu: 2
  render_memory_mb: 4096
  render_timeout_s: 300
  reward_cpu: 4
  reward_memory_mb: 8192
  reward_timeout_s: 600
  reward_concurrency: 50
  reward_keep_warm: 1
  max_parallel_workers: 64
  endpoint: ${oc.env:LLM3D_MODAL__ENDPOINT,}
  auth_token: ${oc.env:LLM3D_MODAL__AUTH_TOKEN,}
  volume_name: "llm3d-data"

metrics:
  num_sample_points_fast: 10000
  num_sample_points_eval: 100000
  f_score_thresholds: [0.01, 0.05]
  hausdorff_percentile: 90.0
  clip_model: "openai/clip-vit-large-patch14"
  clip_num_views: 4

tinker:
  base_model: "Qwen/Qwen2.5-Coder-7B-Instruct"

eval:
  id_test_size: 1500
  ood_objaverse: 500
  ood_gso: 300
  ood_unseen_categories: 200
  unseen_categories:
    - fork
    - spoon
    - tv
    - window
    - door
  temperature: 0.0
  bootstrap_samples: 10000

logging:
  level: "INFO"
  log_dir: "./logs"
  wandb_project: "text-to-3d-rlvr"
  wandb_enabled: false
